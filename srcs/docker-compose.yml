services: 
  nginx:
    build:
      context: ./requirements/nginx  
      dockerfile: Dockerfile
    ports: 
      - "80:80"
    volumes:
      - ./requirements/nginx/conf:/etc/nginx/conf.d
    networks:
      - inception
    restart: always
    depends_on:
      - mariadb

  mariadb:
    container_name : mariadebezinha
    build:
      context: ./requirements/mariadb/
      dockerfile: Dockerfile
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD_FILE: /run/secrets/db_root_password
      MYSQL_PASSWORD_FILE: /run/secrets/db_password
    secrets:
      - db_password
      - db_root_password
    networks:
      - inception
    env_file:
      - .env
    restart: always
  wordpress:
    container_name : wordpress
    build:
      context: ./requirements/wordpress/
      dockerfile: Dockerfile
    ports: 
      - 9000:9000
    volumes:
      - ./requirements/wordpress/conf:/var/www/html
    networks:
      - inception
    env_file:
      - .env
    restart: always
    depends_on:
      - mariadb
secrets:
  db_password:
    file: ./secrets/db_password.txt
  db_root_password:
    file: ./secrets/db_root_password.txt

networks:
  inception: