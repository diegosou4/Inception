version : "3.8"
services: 
  nginx:
    build:
      context: ./requirements/nginx/  
      dockerfile: Dockerfile
    ports: 
      - "80:80"
    volumes:
      - ./requirements/nginx/conf:/usr/local/nginx/conf.d
    restart: always
  wordpress:
    build:
      context : ./requirements/wordpress/
      dockerfile: Dockerfile