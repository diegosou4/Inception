services: 
  nginx:
    container_name : nginx
    build:
      context: ./requirements/nginx  
      dockerfile: Dockerfile
    ports: 
      - "80:80"
    volumes:
      - ./requirements/web:/var/www/html
    networks:
      - inception
    restart: on-failure
    depends_on:
      - wordpress

  wordpress:
    container_name : wordpress
    build:
      context: ./requirements/wordpress/
      dockerfile: Dockerfile
    ports: 
      - "9000:9000"
    volumes:
      - ./requirements/web:/var/www/html
    environment:
      WP_DB_HOST: mariadb:3306
      MYSQL_PASSWORD_FILE: /run/secrets/db_password
    secrets:
      - db_password
    networks:
      - inception
    env_file:
      - .env
    restart: on-failure
    depends_on:
      - mariadb
      
  mariadb:
    container_name : mariadebezinha
    build:
      context: ./requirements/mariadb/
      dockerfile: Dockerfile
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD_FILE: /run/secrets/db_root_password
      MYSQL_PASSWORD_FILE: /run/secrets/db_password
    secrets:
      - db_password
      - db_root_password
    networks:
      - inception
    env_file:
      - .env
    restart: always
secrets:
  db_password:
    file: ./secrets/db_password.txt
  db_root_password:
    file: ./secrets/db_root_password.txt

networks:
  inception: